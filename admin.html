<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — CryptoMart</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="config.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#f8f9fa; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-card { background:#fff; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.1); padding:40px 36px; width:100%; max-width:400px; }
.login-card h1 { font-size:1.5rem; font-weight:700; margin-bottom:4px; text-align:center; }
.login-card .sub { color:#636e72; font-size:0.9rem; margin-bottom:24px; text-align:center; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:0.8rem; font-weight:600; color:#636e72; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
.form-group input { width:100%; padding:12px 16px; border:2px solid #dfe6e9; border-radius:8px; font-size:0.95rem; outline:none; transition:0.3s; }
.form-group input:focus { border-color:#6c5ce7; }
.btn { width:100%; padding:14px; border:none; background:linear-gradient(135deg,#6c5ce7,#5a4bd1); color:#fff; font-weight:600; font-size:1rem; border-radius:8px; cursor:pointer; transition:0.3s; }
.btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(108,92,231,0.3); }
.btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
.error { color:#e17055; font-size:0.85rem; text-align:center; margin-top:12px; display:none; }
.back-link { display:block; text-align:center; margin-top:16px; color:#636e72; font-size:0.85rem; text-decoration:none; }
.back-link:hover { color:#6c5ce7; }
</style>
</head>
<body>
<div class="login-card">
    <h1>&#x1f6e1;&#xfe0f; Admin Login</h1>
    <p class="sub">Sign in to manage your store</p>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@cryptomart.com" />
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" />
    </div>
    <button class="btn" id="loginBtn" onclick="adminLogin()">Sign In</button>
    <div class="error" id="loginError">Invalid credentials.</div>
    <a href="index.html" class="back-link">&#x2190; Back to Store</a>
</div>

<script>
auth.onAuthStateChanged((user) => {
    if (user) { window.location.href = 'dashboard.html'; }
});

function adminLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorDiv = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    errorDiv.style.display = 'none';

    if (!email || !password) {
        errorDiv.textContent = 'Please enter email and password.';
        errorDiv.style.display = 'block';
        return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;

    auth.signInWithEmailAndPassword(email, password)
        .then(() => {
            window.location.href = 'dashboard.html';
        })
        .catch((error) => {
            btn.textContent = 'Sign In';
            btn.disabled = false;
            let msg = error.message;
            if (msg.includes('user record') || msg.includes('user-not-found')) msg = 'No admin account found with this email.';
            else if (msg.includes('wrong-password') || msg.includes('invalid-password')) msg = 'Incorrect password.';
            else if (msg.includes('too-many-requests')) msg = 'Too many attempts. Please wait and try again.';
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        });
}
</script>
</body>
</html>
